    <a href="index.html">Home</a>

<section>
    <h1>Artist Enquiry Form</h1>

    <form onsubmit="return handleEnquiry()">

        <input type="text" id="name" placeholder="Full Name"><br><br>

        <input type="email" id="email" placeholder="Email"><br><br>

        <input type="tel" id="phone" placeholder="Phone Number"><br><br>

        <select id="service">
            <option value="">Select Service</option>
            <option value="recording">Recording Session</option>
            <option value="mixing">Mixing</option>
            <option value="mastering">Mastering</option>
            <option value="artist">Artist Development</option>
        </select><br><br>

        <button type="submit">Submit Enquiry</button>
    </form>

    <p id="response"></p>
</section>
